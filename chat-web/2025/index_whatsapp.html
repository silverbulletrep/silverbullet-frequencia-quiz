            // Mostrar indicador de digitação
            function showTypingIndicator() {
                const typingDiv = document.createElement('div');
                typingDiv.className = 'typing-indicator';
                typingDiv.innerHTML = '<span></span><span></span><span></span>';
                typingDiv.id = 'typing-indicator';
                messagesContainer.appendChild(typingDiv);
                scrollToBottom();
            }

            // Remover indicador de digitação
            function hideTypingIndicator() {
                const typingIndicator = document.getElementById('typing-indicator');
                if (typingIndicator) {
                    typingIndicator.remove();
                }
            }

            // Adicionar mensagem ao chat
            async function addMessage(message, isUser = false) {
                const messageElement = createMessageElement(message, isUser);
                messagesContainer.appendChild(messageElement);

                // Ajustar explicitamente as margens dos timestamps após adicionar ao DOM
                setTimeout(() => {
                    const replyContainers = messageElement.querySelectorAll('.reply-container');
                    const timeElements = messageElement.querySelectorAll('.message-time');

                    timeElements.forEach(el => {
                        // Verificar se este elemento de tempo está dentro ou após um contêiner de resposta
                        const isInReplyContainer = el.closest('.reply-container') !== null;
                        const hasReplyContainerSibling = el.parentElement &&
                            el.parentElement.querySelector('.reply-container') !== null;

                        if (isInReplyContainer || hasReplyContainerSibling || replyContainers.length > 0) {
                            el.style.marginBottom = '0px';
                            el.style.marginLeft = '-8px';
                        } else {
                            el.style.marginBottom = '-4px';
                        }
                    });
                }, 0);

                // Calcular o delay apropriado para esta mensagem
                const delay = await getMessageDelay(message);

                // Atualizar o iScroll e rolar para o fim
                setTimeout(function () {
                    // Verificar se há imagens na mensagem e esperar que carreguem
                    const images = messageElement.querySelectorAll('img');
                    if (images.length > 0) {
                        // Se houver imagens, esperar pelo carregamento antes de atualizar
                        let loadedImages = 0;
                        images.forEach(img => {
                            if (img.complete) {
                                loadedImages++;
                            } else {
                                img.onload = function () {
                                    loadedImages++;
                                    if (loadedImages === images.length) {
                                        refreshScrollAndCheckContent();
                                    }
                                };
                                img.onerror = function () {
                                    loadedImages++;
                                    if (loadedImages === images.length) {
                                        refreshScrollAndCheckContent();
                                    }
                                };
                            }
                        });

                        if (loadedImages === images.length) {
                            refreshScrollAndCheckContent();
                        }
                    } else {
                        // Se não houver imagens, atualizar diretamente
                        refreshScrollAndCheckContent();
                    }

                    function refreshScrollAndCheckContent() {
                        // Verificar a altura real do conteúdo
                        const containerHeight = chatContainer.clientHeight;
                        const contentHeight = messagesContainer.offsetHeight;

                        // Apenas atualizar e rolar se houver conteúdo suficiente
                        if (contentHeight > containerHeight) {
                            if (chatScroll) {
                                chatScroll.refresh();

                                // Verificar se deve rolar para o fim
                                const isNearBottom = chatScroll ?
                                    (chatScroll.y > chatScroll.maxScrollY - 150) : true;

                                if ((isUser || isNearBottom) && shouldAutoScroll) {
                                    // Usar um valor negativo para garantir que não haja espaço em branco no final
                                    chatScroll.scrollTo(0, chatScroll.maxScrollY, 300);
                                }
                            }
                        }
                    }
                }, 100);

                // Retornar o delay calculado para que a função chamadora possa aguardar
                return delay;
            }

            // Modificar a função scrollToBottom para ser mais inteligente
            function scrollToBottom(force = false) {
                if (chatScroll) {
                    // Apenas rolar se tiver conteúdo suficiente para justificar rolagem
                    const containerHeight = chatContainer.clientHeight;
                    const contentHeight = messagesContainer.offsetHeight;

                    // Não rolar se não houver conteúdo suficiente
                    if (contentHeight <= containerHeight) {
                        return;
                    }

                    // Se force for verdadeiro ou shouldAutoScroll for verdadeiro
                    if (force || shouldAutoScroll) {
                        setTimeout(function () {
                            chatScroll.refresh();
                            // Evita rolar além do possível
                            if (chatScroll.maxScrollY < 0) {
                                chatScroll.scrollTo(0, chatScroll.maxScrollY, 300);
                            }
                        }, 100);
                    }
                }
            }

            // Extrair ID do YouTube de uma URL
            function getYoutubeVideoId(url) {
                const regExp = /^.*(youtu.be\/|v\/|u\/\w\/|embed\/|watch\?v=|&v=)([^#&?]*).*/;
                const match = url.match(regExp);
                return (match && match[2].length === 11) ? match[2] : null;
            }

            // Processar entrada do usuário enviando para Agente de IA
            async function processUserInput(userInput) {
                if (!userInput.trim()) return;

                // 1. Adicionar mensagem do usuário ao chat local
                await addMessage({ type: 'text', content: userInput }, true);

                // 2. Limpar campo de entrada
                messageInput.value = '';

                // 3. Mostrar indicador de digitação
                showTypingIndicator();

                // 4. Enviar para o Agente de IA no N8N
                const aiResponse = await sendMessageToIA(userInput);

                // 5. Remover indicador de digitação
                hideTypingIndicator();

                if (aiResponse) {
                    // Armazenar no histórico para contexto futuro
                    if (!chatData.conversaIA) chatData.conversaIA = [];

                    // Extrair texto da resposta de forma ultra flexível
                    let responseText = "";
                    if (typeof aiResponse === 'string') {
                        responseText = aiResponse;
                    } else {
                        // Prioridade para campos comuns do N8N e Agentes
                        responseText = aiResponse.output || aiResponse.text || aiResponse.resposta || aiResponse.message || (aiResponse.message1 && aiResponse.message1.texto) || (typeof aiResponse === 'object' ? JSON.stringify(aiResponse) : String(aiResponse));
                    }

                    chatData.conversaIA.push({
                        pergunta: userInput,
                        resposta: responseText,
                        timestamp: new Date().toISOString()
                    });

                    // 6. Exibir as mensagens retornadas pela IA
                    // Verificar se é o formato de mensagens estruturadas (message1, etc)
                    if (aiResponse.message1 || aiResponse.message2 || aiResponse.message3) {
                        await processN8NResponse(aiResponse);
                    } else {
                        // Se for uma resposta única ou texto puro, usar a lógica de validação rigorosa
                        // Convertemos para o formato que showN8NMessage espera para manter consistência
                        const normalizedResponse = typeof aiResponse === 'string' ? { texto: aiResponse } : {
                            texto: responseText,
                            imagem: aiResponse.imageUrl || aiResponse.imagem,
                            audio: aiResponse.audioUrl || aiResponse.audio,
                            youtube_id: aiResponse.videoId || aiResponse.youtube_id
                        };

                        await showN8NMessage(normalizedResponse);
                    }
                } else {
                    // Fallback em caso de erro na rede/webhook
                    await addMessage({
                        type: 'text',
                        content: 'Desculpe, tive um pequeno problema de conexão. Poderia repetir?'
                    });
                }

                waitForUserInput();
            }

            // Iniciar o chat
            async function startChat() {
                // Verificar se o chat já foi iniciado para evitar duplicação
                if (chatData.isChatStarted) return;

                chatData.isChatStarted = true;

                // PIXEL META: Ver Conteúdo - Usuário iniciou interação com o chat
                try {
                    await sendMetaConversionEvent('ViewContent', {
                        country: 'Portugal'
                    }, {
                        content_type: 'chat_interaction',
                        content_name: 'WhatsApp Chat Iniciado',
                        currency: 'EUR',
                        source: 'whatsapp_chat'
                    });
                } catch (error) {
                    console.error('Erro ao enviar pixel ViewContent:', error);
                }

                // Gerar um ID de sessão único
                chatData.session_id = 'ws_' + Date.now() + '_' + Math.random().toString(36).substr(2, 9);

                // Esconder o perfil e mostrar o chat imediatamente
                if (profileSection) profileSection.style.display = 'none';
                if (loadingIndicator) loadingIndicator.style.display = 'none';

                chatContainer.style.display = 'block';
                chatContainer.style.opacity = '1';
                chatContainer.style.transform = 'translateY(0)';

                // Definir estilos de rolagem - corrigido para evitar barras duplas
                chatContainer.style.overflowY = 'hidden';
                chatContainer.style.WebkitOverflowScrolling = 'touch';

                // Habilitar o campo de entrada
                messageInput.removeAttribute('readonly');

                // Desbloquear áudio para iOS
                unlockAudioForIOS();

                // Iniciar fluxo N8N
                initializeN8NFlow();

                // Inicializar o iScroll para rolagem suave
                initScrolling();

                // Criar botão de rolagem para o fim
                createScrollToBottomButton();

                // Adicionar classe para melhorar a rolagem em dispositivos móveis
                document.body.classList.add('chat-started');

                // Força uma atualização da rolagem após o chat iniciar
                setTimeout(function () {
                    if (chatScroll) {
                        chatScroll.refresh();
                        scrollToBottom(true);
                    }
                }, 100);
            }

            // Inicializar iScroll para rolagem suave
            function initScrolling() {
                // Certificar-se de que o container está visível
                if (!chatContainer) return;

                // Destruir instância anterior se existir
                if (chatScroll) {
                    chatScroll.destroy();
                    chatScroll = null;
                }

                // Configurar o iScroll com opções otimizadas para dispositivos móveis
                chatScroll = new IScroll(chatContainer, {
                    scrollbars: true,
                    mouseWheel: true,
                    interactiveScrollbars: true,
                    shrinkScrollbars: 'scale',
                    fadeScrollbars: true,
                    click: true,
                    tap: true,
                    useTransition: true,
                    useTransform: true,
                    probeType: 3,
                    momentum: true,
                    bounce: false, // Desativar o efeito de "bounce" que pode causar rolagem em área vazia
                    deceleration: 0.001, // Reduzir a velocidade de desaceleração para evitar rolar demais
                    // Adicionadas opções para melhorar a rolagem
                    preventDefaultException: { tagName: /^(INPUT|TEXTAREA|BUTTON|SELECT|A|IMG)$/ },
                    disablePointer: true,
                    disableTouch: false,
                    disableMouse: false
                });

                // Detectar quando o usuário rola manualmente
                chatScroll.on('scrollStart', function () {
                    userHasScrolled = true;

                    // Verificar se há algum conteúdo
                    if (messagesContainer.offsetHeight <= chatContainer.clientHeight) {
                        // Se não houver conteúdo suficiente, cancelar rolagem
                        this.enabled = false;
                        // Reativar após um pequeno delay
                        setTimeout(() => { this.enabled = true; }, 100);
                    }
                });

                // Corrigir o problema de rolagem para o nada
                chatScroll.on('scrollEnd', function () {
                    // Se o conteúdo for menor que o container, não permitir rolagem
                    if (messagesContainer.offsetHeight <= chatContainer.clientHeight) {
                        return;
                    }

                    // Verificar se o usuário está próximo do fim
                    const isNearBottom = this.y > this.maxScrollY - 50;

                    // Se estiver próximo do fim, permitir rolagem automática
                    if (isNearBottom) {
                        shouldAutoScroll = true;
                    } else {
                        shouldAutoScroll = false;
                    }

                    // Verificar se a rolagem está além do limite permitido
                    if (this.y < this.maxScrollY) {
                        // Voltar para o limite máximo de rolagem
                        this.scrollTo(0, this.maxScrollY, 300);
                    } else if (this.y > 0) {
                        // Voltar para o topo se rolar além do início
                        this.scrollTo(0, 0, 300);
                    }
                });

                // Atualizar o iScroll quando o layout mudar
                window.addEventListener('resize', function () {
                    if (chatScroll) {
                        setTimeout(function () {
                            chatScroll.refresh();

                            // Verificar altura do conteúdo
                            const containerHeight = chatContainer.clientHeight;
                            const contentHeight = messagesContainer.offsetHeight;

                            // Ajustar posição se necessário
                            if (contentHeight <= containerHeight) {
                                chatScroll.scrollTo(0, 0, 100); // Conteúdo menor que o container, manter no topo
                            } else if (chatScroll.y < chatScroll.maxScrollY) {
                                chatScroll.scrollTo(0, chatScroll.maxScrollY, 100); // Corrigir se estiver além do fim
                            }
                        }, 200);
                    }
                });

                // Garantir que o iScroll seja atualizado periodicamente
                setInterval(function () {
                    if (chatScroll) {
                        chatScroll.refresh();

                        // Verificar e corrigir posições inválidas
                        if (chatScroll.y < chatScroll.maxScrollY) {
                            chatScroll.scrollTo(0, chatScroll.maxScrollY, 100);
                        }

                        // Se o conteúdo for menor que o container, manter no topo
                        if (messagesContainer.offsetHeight <= chatContainer.clientHeight) {
                            chatScroll.scrollTo(0, 0, 100);
                        }
                    }
                }, 2000);

                // Rolagem para o fim, mas apenas se tiver conteúdo suficiente
                if (messagesContainer.offsetHeight > chatContainer.clientHeight) {
                    scrollToBottom(true);
                }
            }

            // Criar botão para rolar para o fim
            function createScrollToBottomButton() {
                const scrollBtn = document.createElement('button');
                scrollBtn.id = 'scroll-to-bottom';
                scrollBtn.innerHTML = '&darr;';
                scrollBtn.style.position = 'fixed';
                scrollBtn.style.bottom = '70px';
                scrollBtn.style.right = '15px';
                scrollBtn.style.width = '45px';
                scrollBtn.style.height = '45px';
                scrollBtn.style.borderRadius = '50%';
                scrollBtn.style.background = '#00a884';
                scrollBtn.style.color = 'white';
                scrollBtn.style.border = 'none';
                scrollBtn.style.fontSize = '22px';
                scrollBtn.style.fontWeight = 'bold';
                scrollBtn.style.boxShadow = '0 1px 3px rgba(0,0,0,0.3)';
                scrollBtn.style.cursor = 'pointer';
                scrollBtn.style.zIndex = '1000';
                scrollBtn.style.display = 'none';
                document.body.appendChild(scrollBtn);

                // Mostrar o botão quando rolar para cima
                if (chatScroll) {
                    chatScroll.on('scroll', function () {
                        if (this.y < this.maxScrollY + 100) {
                            scrollBtn.style.display = 'none';
                        } else {
                            scrollBtn.style.display = 'block';
                        }
                    });
                }

                // Rolar para o fim ao clicar
                scrollBtn.addEventListener('click', function () {
                    scrollToBottom();
                });
            }

            // Preparar para receber entrada do usuário
            function waitForUserInput() {
                chatData.waitingForUserInput = true;
                // Remover o foco automático para evitar que o teclado apareça sozinho
                // O usuário precisa clicar manualmente para abrir o teclado
            }

            // Eventos para iniciar o chat (ÚNICO EVENT LISTENER)
            if (startChatBtn) {
                startChatBtn.addEventListener('click', function () {
                    // Verificar se o chat já foi iniciado para evitar cliques múltiplos
                    if (chatData.isChatStarted) return;

                    // Desabilitar o botão temporariamente para evitar cliques múltiplos
                    startChatBtn.disabled = true;
                    startChatBtn.style.opacity = '0.6';
                    startChatBtn.style.cursor = 'not-allowed';

                    // Certificar-se de que o indicador de carregamento está centralizado
                    setTimeout(() => {
                        if (loadingIndicator) {
                            loadingIndicator.style.left = '50%';
                            loadingIndicator.style.top = '50%';
                            loadingIndicator.style.transform = 'translate(-50%, -50%)';
                        }
                    }, 300);

                    // Configurar rolagem inicial
                    setTimeout(function () {
                        const chatContainer = document.getElementById('chat-container');
                        if (chatContainer) {
                            chatContainer.scrollTop = chatContainer.scrollHeight;
                        }
                        scrollToBottom(true);
                        userHasScrolled = false;
                        shouldAutoScroll = true;
                    }, 1000);

                    // Iniciar o chat
                    startChat();
                });
            }

            // Configurar botão de alternância de versão
            const versionToggle = document.getElementById('version-toggle');
            const versionIndicator = document.getElementById('version-indicator');

            if (versionToggle && versionIndicator) {
                // Inicializar com o valor atual
                versionIndicator.textContent = chatData.experimentID === "v1-main" ? "MAIN" : "EXP";
                versionToggle.style.backgroundColor = chatData.experimentID === "v1-main" ? "rgba(255,255,255,0.1)" : "rgba(0,255,255,0.2)";

                versionToggle.addEventListener('click', function () {
                    // Alternar entre main e experimental
                    if (chatData.experimentID === "v1-main") {
                        chatData.experimentID = "v2-experimental";
                        versionIndicator.textContent = "EXP";
                        versionToggle.style.backgroundColor = "rgba(0,255,255,0.2)";
                    } else {
                        chatData.experimentID = "v1-main";
                        versionIndicator.textContent = "MAIN";
                        versionToggle.style.backgroundColor = "rgba(255,255,255,0.1)";
                    }

                    // Salvar a preferência no localStorage
                    try {
                        localStorage.setItem('whatsapp_version', chatData.experimentID);
                    } catch (e) {
                        console.error('Erro ao salvar versão no localStorage:', e);
                    }

                    console.log('Versão alterada para:', chatData.experimentID);
                });

                // Verificar se há uma preferência salva no localStorage
                try {
                    const savedVersion = localStorage.getItem('whatsapp_version');
                    if (savedVersion) {
                        chatData.experimentID = savedVersion;
                        versionIndicator.textContent = chatData.experimentID === "v1-main" ? "MAIN" : "EXP";
                        versionToggle.style.backgroundColor = chatData.experimentID === "v1-main" ? "rgba(255,255,255,0.1)" : "rgba(0,255,255,0.2)";
                    }

                    // Registrar a versão no console para debug
                    console.log('Versão carregada do localStorage:', chatData.experimentID);
                } catch (e) {
                    console.error('Erro ao ler versão do localStorage:', e);
                }
            }

            // Enviar mensagem ao pressionar Enter
            messageInput.addEventListener('keypress', function (e) {
                if (e.key === 'Enter' && !e.shiftKey && chatData.waitingForUserInput) {
                    e.preventDefault();
                    const userInput = messageInput.value.trim();
                    if (userInput) {
                        chatData.waitingForUserInput = false;
                        processUserInput(userInput);
                    }
                }
            });

            // Enviar mensagem ao clicar no botão
            sendButton.addEventListener('click', function () {
                if (chatData.waitingForUserInput) {
                    const userInput = messageInput.value.trim();
                    if (userInput) {
                        chatData.waitingForUserInput = false;
                        processUserInput(userInput);
                    }
                }
            });

            // Eventos para desbloquear áudio no iOS
            document.addEventListener('touchstart', unlockAudioForIOS, { once: true });
            document.addEventListener('click', unlockAudioForIOS, { once: true });

            // CORREÇÃO: Lidar com o teclado de forma mais robusta
            if (window.visualViewport) {
                window.visualViewport.addEventListener('resize', function () {
                    if (chatData.isChatStarted) {
                        const keyboardHeight = window.innerHeight - window.visualViewport.height;

                        if (keyboardHeight > 150) {
                            // Teclado visível
                            document.body.classList.add('keyboard-open');

                            // Adicionar um atraso para rolagem funcionar após o teclado abrir completamente
                            setTimeout(scrollToBottom, 300);
                        } else {
                            // Teclado fechado
                            document.body.classList.remove('keyboard-open');
                        }
                    }
                });
            }

            // Adicionar eventos de toque para dispositivos móveis - REMOVIDO (duplicado)

            // Melhorar tratamento de orientação
            window.addEventListener('orientationchange', function () {
                // Aguardar a conclusão da mudança de orientação
                setTimeout(() => {
                    if (chatData.isChatStarted) {
                        scrollToBottom();
                    }
                }, 500); // Um pouco mais de tempo para a rotação ser concluída
            });

            // Prevenir zoom em inputs e eventos de double-tap no iOS
            document.addEventListener('gesturestart', (e) => e.preventDefault());
            document.addEventListener('touchmove', (e) => {
                if (e.scale !== 1) e.preventDefault();
            }, { passive: false });

            // Criar botão de rolagem para o fim (consolidado)
            const scrollButton = document.createElement('button');
            scrollButton.id = 'scroll-down-button';
            scrollButton.innerHTML = '↓';
            scrollButton.style.position = 'fixed';
            scrollButton.style.right = '16px';
            scrollButton.style.bottom = '70px';
            scrollButton.style.width = '40px';
            scrollButton.style.height = '40px';
            scrollButton.style.borderRadius = '50%';
            scrollButton.style.backgroundColor = '#00a884';
            scrollButton.style.color = 'white';
            scrollButton.style.border = 'none';
            scrollButton.style.fontSize = '20px';
            scrollButton.style.fontWeight = 'bold';
            scrollButton.style.boxShadow = '0 1px 3px rgba(0,0,0,0.3)';
            scrollButton.style.zIndex = '1000';
            scrollButton.style.display = 'none';
            document.body.appendChild(scrollButton);

            // Monitorar eventos de rolagem
            if (chatContainer) {
                chatContainer.addEventListener('scroll', function () {
                    // Detectar quando o usuário está rolando
                    if (!isScrolling) {
                        userHasScrolled = true;
                        isScrolling = true;

                        // Limpar o temporizador se já existir
                        if (window.scrollTimeout) {
                            clearTimeout(window.scrollTimeout);
                        }

                        // Definir temporizador para considerar que a rolagem terminou
                        window.scrollTimeout = setTimeout(function () {
                            isScrolling = false;

                            // Se estiver próximo do fim, permitir auto-scroll novamente
                            if (isNearBottom()) {
                                userHasScrolled = false;
                                shouldAutoScroll = true;
                                hideScrollButton();
                            } else {
                                shouldAutoScroll = false;
                                showScrollButton();
                            }
                        }, 150);
                    }

                    lastScrollPosition = chatContainer.scrollTop;
                }, { passive: true });

                // Adicionar evento de clique ao botão de rolagem
                scrollButton.addEventListener('click', function () {
                    userHasScrolled = false;
                    shouldAutoScroll = true;
                    scrollToBottom(true);
                    hideScrollButton();
                });

                // Desativar todos os outros listeners que possam interferir
                chatContainer.ontouchstart = null;
                chatContainer.ontouchmove = null;
                chatContainer.ontouchend = null;
            }

            // Garantir que o messageInput não faça a página rolar automaticamente
            if (messageInput) {
                messageInput.addEventListener('focus', function () {
                    // Evitar que o foco cause rolagem automática
                    setTimeout(function () {
                        if (userHasScrolled && !isNearBottom()) {
                            // Não fazemos nada se o usuário rolou para cima e não está no fim
                        } else {
                            scrollToBottom(true);
                        }
                    }, 300);
                });
            }

            // NOVO: Verificar se o usuário está próximo do final da conversa
            function isNearBottom() {
                if (!chatContainer) return true;

                const threshold = 150; // pixels
                const position = chatContainer.scrollHeight - chatContainer.scrollTop - chatContainer.clientHeight;
                return position < threshold;
            }


            // Função complementar de espera de resposta do usuário
            async function waitForInput() {
                return new Promise((resolve) => {
                    const messageInput = document.getElementById('message-input');
                    const sendButton = document.getElementById('send-btn');

                    const handleInput = () => {
                        const message = messageInput.value.trim();
                        if (message) {
                            messageInput.value = '';
                            addMessage({
                                type: 'text',
                                content: message
                            }, true).then(() => {
                                // Remove os event listeners
                                sendButton.removeEventListener('click', handleInput);
                                messageInput.removeEventListener('keypress', handleEnter);

                                resolve();
                            }).catch(err => {
                                console.error('Erro ao adicionar mensagem:', err);
                                resolve(); // Resolve mesmo com erro para não travar o fluxo
                            });
                        }
                    };

                    const handleEnter = (e) => {
                        if (e.key === 'Enter') {
                            handleInput();
                        }
                    };

                    // Adiciona event listeners para capturar a resposta
                    sendButton.addEventListener('click', handleInput);
                    messageInput.addEventListener('keypress', handleEnter);
                });
            }

            // Implementação do fluxo N8N
            async function initializeN8NFlow() {
                // Mensagens personalizadas iniciais
                const welcome1 = 'Espere!! Estamos Acompanhando o seu Exame.';
                const welcome2 = 'Esta com alguma duvida?';

                await addMessage({ type: 'text', content: welcome1 });
                await new Promise(resolve => setTimeout(resolve, 2000));
                await addMessage({ type: 'text', content: welcome2 });
                await new Promise(resolve => setTimeout(resolve, 1000));

                // Notificar N8N que o chat iniciou com estas mensagens automáticas
                sendMessageToIA(`${welcome1} ${welcome2}`, true);

                chatData.currentStep = 0;
                waitForUserInput();
            }

            // Processar resposta do N8N e mostrar mensagens
            async function processN8NResponse(response) {
                if (response.userName) chatData.userName = response.userName;
                if (response.userPhone) chatData.userPhone = response.userPhone;

                if (response.message1) await showN8NMessage(response.message1);
                if (response.message2) await showN8NMessage(response.message2);
                if (response.message3) await showN8NMessage(response.message3);
                if (response.message4) await showN8NMessage(response.message4);
                if (response.message5) await showN8NMessage(response.message5);
                if (response.message6) await showN8NMessage(response.message6);
                if (response.message7) await showN8NMessage(response.message7);
            }

            // Mostrar mensagem individual do N8N com validação rigorosa
            async function showN8NMessage(messageData) {
                if (!messageData) return;

                let delay = parseInt(messageData.delay) * 1000 || 2000;

                // Mostrar indicador de digitação antes do delay
                showTypingIndicator();
                await new Promise(resolve => setTimeout(resolve, delay));
                hideTypingIndicator();

                // Validação rigorosa de tipo de conteúdo - Melhorada para evitar falsos positivos
                if (messageData.imagem && typeof messageData.imagem === 'string' &&
                    messageData.imagem.startsWith('http') && isImageUrl(messageData.imagem)) {
                    await addMessage({
                        type: 'image',
                        imageUrl: messageData.imagem,
                        text: messageData.texto || ''
                    });
                } else if (messageData.audio && typeof messageData.audio === 'string' && messageData.audio.startsWith('http')) {
                    await addMessage({
                        type: 'audio',
                        audioUrl: messageData.audio,
                        text: messageData.texto || ''
                    });
                } else if (messageData.youtube_id || (messageData.texto && messageData.texto.includes('youtube.com'))) {
                    const videoId = messageData.youtube_id || getYoutubeVideoId(messageData.texto);
                    await addMessage({
                        type: 'youtube',
                        videoId: videoId,
                        text: messageData.texto || ''
                    });
                } else if (messageData.texto || typeof messageData === 'string') {
                    await addMessage({
                        type: 'text',
                        content: messageData.texto || (typeof messageData === 'string' ? messageData : '')
                    });
                }
            }

            // ═══════════════════════════════════════════════════
            // SISTEMA EXIT-INTENT — Johann Müller
            // Lê o checkpoint da URL (?from=) e exibe o gancho correto
            // ═══════════════════════════════════════════════════

            const _urlParams = new URLSearchParams(window.location.search);
            const _checkpointRaw = _urlParams.get('from') || '';

            // 2. Normaliza rotas removendo prefixos redundantes (/main e /pt)
            function _normalizeCheckpoint(cp) {
                if (!cp) return '';
                // Remove /main e /pt (em qualquer ordem ou combinação no início)
                // Ex: /main/pt/quiz -> /quiz
                let normalized = cp.replace(/^\/main/, '').replace(/^\/pt/, '');
                return normalized || '/';
            }
            const _checkpoint = _normalizeCheckpoint(_checkpointRaw);

            // 3. Lê os dados do lead do localStorage
            function _getLeadData() {
                try {
                    const raw = localStorage.getItem('lead_cache_app_espiritualidade');
                    return raw ? JSON.parse(raw) : {};
                } catch (e) { return {}; }
            }

            // 6. Exibe as mensagens de abertura sequencialmente
            async function _showOpeningMessages(cp) {
                const messages = _OPENING_MESSAGES[cp] || _OPENING_MESSAGES['/quiz'];
                let delay = 1200;
                for (let i = 0; i < messages.length; i++) {
                    await new Promise(resolve => setTimeout(resolve, delay));
                    const text = messages[i];
                    await addMessage({ type: 'text', content: text });
                    // Registra no histórico para o agente
                    window._exitIntentHistory.push({ role: 'assistant', content: text });
                    delay = Math.max(800, text.length * 28);
                }
            }

            // 7. Monta o payload completo para o agente IA
            window._buildAgentPayload = function (userMessage) {
                const lead = _getLeadData();
                return {
                    checkpoint_id: _checkpoint || '/quiz',
                    genero: lead.genero || null,
                    idade: lead.idade || null,
                    problema_principal: lead.problema_principal || lead.selected_option || null,
                    etapa_atual_do_funil: lead.etapa_atual || null,
                    respostas_quiz: lead.respostas_quiz || null,
                    contato: lead.whatsapp || lead.email || null,
                    message: userMessage,
                    conversation_history: window._exitIntentHistory.slice()
                };
            };

            // 8. Intercepta o envio de mensagens para enriquecer o payload
            // (o agente de n8n espera o payload via o body do POST)
            // Esta função é chamada pela lógica de envio existente
            window._onUserMessage = function (text) {
                window._exitIntentHistory.push({ role: 'user', content: text });
            };
            window._onAgentMessage = function (text) {
                if (text) window._exitIntentHistory.push({ role: 'assistant', content: text });
            };

            // 9. Se veio de um exit-intent, exibe as mensagens de abertura após o chat iniciar
            if (_checkpoint && _OPENING_MESSAGES[_checkpoint]) {
                // Aguarda o chat inicializar completamente e então exibe os ganchos
                const _origStartChat = startChat;
                startChat = function () {
                    _origStartChat.apply(this, arguments);
                    setTimeout(function () {
                        _showOpeningMessages(_checkpoint);
                    }, 2000);
                };
            }

            // Auto-iniciar o chat
            startChat();
        });
